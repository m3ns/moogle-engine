<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moogle</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <div class="container">
      <div class="logo-section">
        <img
          src="./images/Screenshot from 2026-05-08 18-26-18.png"
          alt="Moogle logo"
          class="logo"
        />
      </div>

      <div class="search-section">
        <h2 class="tagline">We do our best and never leave the rest</h2>

        <div class="search-box">
          <input
            type="text"
            class="search-input"
            placeholder="Search with Moogle..."
            id="searchInput"
          />
          <button class="search-btn" id="searchBtn">Search</button>
        </div>
      </div>
    </div>
  </body>
</html>
